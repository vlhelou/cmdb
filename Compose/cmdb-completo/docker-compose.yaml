services:

  cmdbapp:
    image: vlhelou/cmdb:latest
    container_name: ct-cmdbapp
    restart: always
    ports:
      - "4500:8080"
    depends_on:
      - db
    networks:
      - cmdbnet
    environment:
      - CMDB_DB=Host:db;Database:cmdb;Username:usrapp;Password:6nO5870pExuj


  db:
    image: pgvector/pgvector:0.8.1-pg18-trixie
    container_name: ct-db
    restart: always
    volumes:
      - ./postgres:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${senhaPost}
      - TZ=America/Sao_Paulo
    ports:
      - "5432:5432"
    networks:
      - cmdbnet

  otel:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ct-otel
    restart: always
    # volumes:
    #   - ./otel/config/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
      - "4317:4317"
      - "8889:8889"
    networks:
      - cmdbnet

  prometheuslocal:
    image: prom/prometheus:latest
    container_name: ct-prometheus
    restart: always
    depends_on:
      - otel
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - cmdbnet
    command: 
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'

  grafana:
    image: grafana/grafana:latest
    container_name: ct-grafana
    restart: always
    depends_on:
      - prometheuslocal
    ports:
      - "3000:3000"
    volumes:
      - ./grafana:/var/lib/grafana
    networks:
      - cmdbnet



networks:
  cmdbnet:
    driver: bridge
